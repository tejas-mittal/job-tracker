name: tracker-service CI/CD

# ── Trigger ─────────────────────────────────────────────────────────
# Only runs when files inside tracker-service/ change, demonstrating
# independent deployability of individual microservices.
on:
  push:
    branches: [main, develop]
    paths:
      - "tracker-service/**"
      - ".github/workflows/tracker-service.yml"
  pull_request:
    branches: [main]
    paths:
      - "tracker-service/**"
      - ".github/workflows/tracker-service.yml"

# ── Jobs ─────────────────────────────────────────────────────────────
jobs:

  # ── 1. Test ─────────────────────────────────────────────────────
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: temurin
          cache: maven

      - name: Run unit tests
        working-directory: tracker-service
        run: mvn -B test

      - name: Publish test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: tracker-service/target/surefire-reports/

  # ── 2. Build & Push Docker image (main branch only) ────────────
  build-and-push:
    name: Build & Push Docker Image
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write   # required to push to GHCR

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata (tags + labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/tracker-service
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: tracker-service
          file: tracker-service/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  # ── 3. Deploy (main branch only, after image push) ─────────────
  deploy:
    name: Deploy to Render / Railway
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      # Render deploy hook — set TRACKER_SERVICE_RENDER_DEPLOY_HOOK in repo secrets.
      # Leave secret unset to skip deployment (CI/CD still runs tests and builds image).
      - name: Trigger Render deploy hook
        if: ${{ secrets.TRACKER_SERVICE_RENDER_DEPLOY_HOOK != '' }}
        env:
          DEPLOY_HOOK: ${{ secrets.TRACKER_SERVICE_RENDER_DEPLOY_HOOK }}
        run: |
          echo "Triggering Render deployment..."
          curl -fsS -X POST "$DEPLOY_HOOK"
          echo "Deploy hook triggered."
