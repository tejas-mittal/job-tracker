name: email-service CI/CD

on:
  push:
    branches: [main, develop]
    paths:
      - "email-service/**"
      - ".github/workflows/email-service.yml"
  pull_request:
    branches: [main]
    paths:
      - "email-service/**"
      - ".github/workflows/email-service.yml"

jobs:

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: temurin
          cache: maven

      - name: Run unit tests
        working-directory: email-service
        run: mvn -B test

      - name: Publish test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports-email
          path: email-service/target/surefire-reports/

  build-and-push:
    name: Build & Push Docker Image
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/email-service
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: email-service
          file: email-service/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy:
    name: Deploy to Render / Railway
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Trigger Render deploy hook
        if: ${{ secrets.EMAIL_SERVICE_RENDER_DEPLOY_HOOK != '' }}
        env:
          DEPLOY_HOOK: ${{ secrets.EMAIL_SERVICE_RENDER_DEPLOY_HOOK }}
        run: |
          curl -fsS -X POST "$DEPLOY_HOOK"
          echo "Email service deploy triggered."
